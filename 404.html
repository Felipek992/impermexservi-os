<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada — Impermex Serviços</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#F8FFFE;font-family:'Plus Jakarta Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
.card{background:#fff;border:1.5px solid rgba(26,122,74,.12);border-radius:20px;padding:52px 40px;max-width:480px;width:100%;text-align:center;box-shadow:0 12px 40px rgba(26,122,74,.08);}
.num{font-family:'Playfair Display',serif;font-size:6rem;font-weight:900;color:rgba(26,122,74,.12);line-height:1;margin-bottom:8px;}
.title{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:900;color:#1A2E24;margin-bottom:12px;}
.sub{font-size:.92rem;color:#6B8C7A;line-height:1.65;margin-bottom:30px;}
.btn{background:#1A7A4A;color:#fff;border:none;padding:14px 32px;font-family:'Plus Jakarta Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block;border-radius:50px;transition:all .3s;}
.btn:hover{background:#25A864;transform:translateY(-2px);}
.logo{font-family:'Playfair Display',serif;font-size:1rem;font-weight:900;color:#1A7A4A;margin-bottom:28px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Impermex Serviços</div>
  <div class="num">404</div>
  <div class="title">Página não encontrada</div>
  <div class="sub">A página que você procura não existe ou foi movida. Volte ao início e encontre o que precisa.</div>
  <a href="index.html" class="btn">Voltar ao Início</a>
</div>
</body>
</html>
